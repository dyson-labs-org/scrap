composite_panels:

  default_review:
    description: Standard panel for general SCRAP spec or code changes
    personas: [Cryptography Reviewer, Lightning Protocol Reviewer, Protocol Spec / Methodology Reviewer]

  crypto_deep_review:
    description: For changes to cryptographic primitives (adaptor sigs, MuSig2, PTLC, Schnorr)
    personas: [Cryptography Reviewer, Adversarial / Security Reviewer, Protocol Spec / Methodology Reviewer]

  lightning_protocol_review:
    description: For HTLC/PTLC payment flow and channel management changes
    personas: [Lightning Protocol Reviewer, Cryptography Reviewer, Protocol Spec / Methodology Reviewer]

  capability_model_review:
    description: For capability token structure, delegation chain, or OPERATOR_API changes
    personas: [Capability Security Reviewer, Cryptography Reviewer, Protocol Spec / Methodology Reviewer]

  space_systems_review:
    description: For SISL, CCSDS alignment, link-layer, or flight-demo hardware changes
    personas: [Space Systems & Satellite Comms Reviewer, Adversarial / Security Reviewer, Protocol Spec / Methodology Reviewer]

  adversarial_review:
    description: For ADVERSARIAL.md, threat-model, or contested-environment design
    personas: [Adversarial / Security Reviewer, Cryptography Reviewer, Space Systems & Satellite Comms Reviewer]

  sisl_physical_layer_review:
    description: For SISL hackathon sisl_rx.py / sisl_framer.py / sdr_devices.py / demo.py signal processing
    personas: [RF / Signals / DSP Reviewer, Spread Spectrum & Coding Theory Reviewer, Covertness / Low-Probability-of-Intercept Reviewer]

  sisl_fec_review:
    description: For SISL convolutional code, interleaver, or future fountain/Raptor-style ARQ
    personas: [Spread Spectrum & Coding Theory Reviewer, Fountain & Post-Quantum Codes Reviewer, RF / Signals / DSP Reviewer]

  sisl_crypto_review:
    description: For sisl_crypto.py (X3DH, ChaCha20-Poly1305, Elligator², key derivation)
    personas: [Cryptographic Primitives Reviewer, Covertness / Low-Probability-of-Intercept Reviewer, Cryptography Reviewer]

  sisl_covertness_review:
    description: For anything touching SISL spreading codes, TX power, or signal indistinguishability from noise
    personas: [Covertness / Low-Probability-of-Intercept Reviewer, RF / Signals / DSP Reviewer, Spread Spectrum & Coding Theory Reviewer]

# Panel selection logic:
# 1. git diff --name-only origin/master...HEAD
# 2. Match each changed file against trigger_paths (glob)
# 3. Union all triggered personas
# 4. If >500 lines changed, always add Protocol Spec / Methodology Reviewer
# 5. Read reviewers.yaml from BASE BRANCH to prevent a PR from editing its own panel.

model_calibration:
  calibrated: pending
  note: "Coverage gap: CCSDS specialists are thin in model training data. For deep Proximity-1 or SDLS parameter questions, escalate to human review. Capability-security has Mark Miller and UCAN/Zelenka coverage but is a narrower specialty than crypto — verify recall before trusting detailed claims. Falcon internals (FFT sampler, Klein sampling over NTRU) are thin — flag parameter-level claims. Elligator-Squared for secp256k1 (short Weierstrass) is weaker coverage than Elligator-2 for Curve25519; SCRIPT.md correctly notes the current Elligator stub is trivially distinguishable. RaptorQ RFC 6330 parameter tables should be cited from the RFC, not recalled."
