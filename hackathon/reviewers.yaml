composite_panels:

  default_review:
    description: Standard panel for general changes
    personas: [adversarial, crypto]

  rf_review:
    description: For RF receive path, DSSS, and SDR hardware code
    personas: [rf, sdr, adversarial]

  coding_review:
    description: For RLNC, FEC, and payload session code
    personas: [coding, spreadcoding, adversarial]

  full_review:
    description: Full panel for protocol-spanning changes
    personas: [rf, sdr, crypto, coding, spreadcoding, adversarial, space, covertness, tdd]

  hackathon_full:
    description: All hackathon-relevant personas for comprehensive review
    personas: [rf, sdr, crypto, coding, spreadcoding, adversarial, space, covertness, tdd]

  hackathon_coord:
    description: For coordination protocol (sisl_coord.py, TDD timing, adversarial)
    personas: [tdd, adversarial, sdr, covertness]

  hackathon_signal:
    description: For signal processing issues (RF + spread spectrum + FEC)
    personas: [rf, sdr, spreadcoding, coding, space]

  hackathon_crypto:
    description: For crypto layer (X3DH, ChaCha20-Poly1305, Elligator)
    personas: [crypto, covertness, adversarial]

# Panel selection logic:
# 1. git diff --name-only origin/master...HEAD
# 2. Match each changed file against trigger_paths (glob)
# 3. Union all triggered personas
# 4. If >500 lines changed, always add adversarial reviewer
# Read from BASE BRANCH to prevent a PR from editing its own reviewer panel.

