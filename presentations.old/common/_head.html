<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- TITLE --></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/theme/black.min.css">
    <style>
        .reveal h1 { font-size: 1.8em; }
        .reveal h2 { font-size: 1.3em; }
        .reveal h3 { font-size: 1.0em; }
        .reveal table { font-size: 0.65em; margin: 0 auto; border-collapse: collapse; }
        .reveal th, .reveal td { padding: 0.4em 0.8em; border: 1px solid #444; }
        .reveal th { background: rgba(66, 175, 250, 0.2); }
        .reveal ul { font-size: 0.75em; }
        .reveal li { margin-bottom: 0.3em; }
        .reveal p { font-size: 0.8em; }
        .reveal .highlight { color: #42affa; }
        .reveal .warn { color: #ff6b6b; }
        .reveal .success { color: #51cf66; }
        .reveal svg { max-width: 100%; height: auto; }
        .reveal .svg-container { margin: 0.8em auto; }
        .reveal .token-box {
            background: rgba(66, 175, 250, 0.1);
            border: 2px solid #42affa;
            border-radius: 8px;
            padding: 0.8em;
            margin: 0.5em auto;
            max-width: 700px;
            text-align: left;
            font-size: 0.65em;
        }
        .reveal .token-box .field {
            margin: 0.3em 0;
        }
        .reveal .token-box .label {
            color: #42affa;
            font-weight: bold;
        }
        .reveal .phase-box {
            background: rgba(66, 175, 250, 0.1);
            border: 1px solid #42affa;
            border-radius: 8px;
            padding: 0.6em;
            margin: 0.3em;
            text-align: center;
        }
        .reveal .phase-box.active {
            border-color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
        }
        .reveal .phase-title {
            font-weight: bold;
            color: #42affa;
            font-size: 0.9em;
        }
        .reveal .phase-box.active .phase-title {
            color: #51cf66;
        }
        .reveal .phase-timeline {
            font-size: 0.7em;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
